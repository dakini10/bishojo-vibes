<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mock C: Grid — KV ヒーロー + 構造的グリッド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=M+PLUS+1p:wght@900&display=swap" rel="stylesheet">
<style>
:root {
  --bv-lime: #c7f284;
  --bv-pink: #ff69b4;
  --bv-bg: #0a1520;
  --bv-surface: #101e2c;
  --bv-border: #1a2e42;
  --bv-text: #e8e6e3;
  --bv-text-muted: #8a9bb0;
  --bv-text-dim: #5a6b7d;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bv-bg);
  color: var(--bv-text);
  font-family: system-ui, -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; text-decoration: none; }

/* ── Concept Badge ── */
.concept-badge {
  position: fixed;
  top: 16px;
  left: 16px;
  background: var(--bv-surface);
  border: 1px solid var(--bv-border);
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 12px;
  color: var(--bv-text-muted);
  z-index: 100;
}
.concept-badge strong { color: var(--bv-lime); }

/* ── Header: Sticky logo bar ── */
header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 32px;
  background: rgba(10, 21, 32, 0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--bv-border);
}

.header-logo {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: 22px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.header-wave {
  height: 16px;
  width: 60px;
}

.header-tag {
  font-size: 11px;
  color: var(--bv-text-dim);
  letter-spacing: 1px;
}

/* ── Hero: Full-width KV area ── */
.hero {
  position: relative;
  height: 80vh;
  min-height: 500px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  margin-top: 56px; /* header offset */
}

/* KV placeholder background */
.hero-kv {
  position: absolute;
  inset: 0;
  background: var(--bv-surface);
  display: flex;
  align-items: center;
  justify-content: center;
}

.hero-kv-text {
  font-size: 14px;
  color: var(--bv-text-dim);
  border: 1px dashed var(--bv-border);
  padding: 16px 32px;
  border-radius: 8px;
}

/* Dark overlay gradient */
.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(10, 21, 32, 0.3) 0%,
    rgba(10, 21, 32, 0.6) 50%,
    rgba(10, 21, 32, 0.95) 100%
  );
}

/* Hero content on top */
.hero-content {
  position: relative;
  z-index: 1;
  text-align: center;
}

.hero-brand {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: clamp(48px, 10vw, 80px);
  color: var(--bv-text);
  letter-spacing: -1px;
  opacity: 0;
  animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
}

.hero-sub {
  font-family: 'M PLUS 1p', sans-serif;
  font-weight: 900;
  font-size: clamp(16px, 3vw, 24px);
  color: var(--bv-text-muted);
  margin-top: 8px;
  opacity: 0;
  animation: fadeInUp 1s ease 0.6s forwards;
}

.hero-wave-container {
  margin-top: 8px;
  opacity: 0;
  animation: fadeIn 1s ease 1s forwards;
}

.hero-tagline {
  font-size: 13px;
  color: var(--bv-text-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 32px;
  opacity: 0;
  animation: fadeIn 1s ease 1.5s forwards;
}

/* ── Stats bar ── */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 48px;
  padding: 32px 24px;
  border-bottom: 1px solid var(--bv-border);
}

.stat {
  text-align: center;
}

.stat-num {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: 28px;
  background: linear-gradient(135deg, var(--bv-lime), var(--bv-pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.stat-label {
  font-size: 11px;
  color: var(--bv-text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 4px;
}

/* ── Sites grid ── */
.sites-section {
  max-width: 1080px;
  margin: 0 auto;
  padding: 64px 24px 80px;
}

.section-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: 12px;
  color: var(--bv-text-dim);
  text-transform: uppercase;
  letter-spacing: 3px;
  text-align: center;
  margin-bottom: 48px;
}

.sites-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

@media (max-width: 900px) {
  .sites-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 500px) {
  .sites-grid { grid-template-columns: 1fr; }
  .stats-bar { gap: 24px; }
  .stat-num { font-size: 22px; }
}

.site-card {
  background: var(--bv-surface);
  border: 1px solid var(--bv-border);
  border-radius: 12px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}

.site-card:hover {
  border-color: transparent;
  transform: translateY(-3px);
}

/* Gradient border on hover */
.site-card::after {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--bv-lime), var(--bv-pink));
  z-index: -1;
  opacity: 0;
  transition: opacity 0.3s;
}

.site-card:hover::after {
  opacity: 1;
}

/* Glow effect */
.site-card:hover {
  box-shadow:
    0 0 24px rgba(199, 242, 132, 0.1),
    0 8px 32px rgba(10, 21, 32, 0.6);
}

.site-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: rgba(199, 242, 132, 0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: 14px;
  color: var(--bv-lime);
}

.site-name {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: 15px;
}

.site-desc {
  font-size: 12px;
  color: var(--bv-text-muted);
  line-height: 1.5;
}

.site-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: auto;
}

.site-type {
  font-size: 10px;
  color: var(--bv-lime);
  border: 1px solid rgba(199, 242, 132, 0.2);
  border-radius: 4px;
  padding: 2px 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.site-arrow {
  margin-left: auto;
  color: var(--bv-text-dim);
  font-size: 14px;
  transition: color 0.3s, transform 0.3s;
}

.site-card:hover .site-arrow {
  color: var(--bv-lime);
  transform: translateX(3px);
}

/* ── Footer ── */
footer {
  text-align: center;
  padding: 32px 24px;
  font-size: 12px;
  color: var(--bv-text-dim);
  border-top: 1px solid var(--bv-border);
}

/* ── Animations ── */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes waveDash {
  from { stroke-dashoffset: 200; }
  to { stroke-dashoffset: 0; }
}
</style>
</head>
<body>

<div class="concept-badge">
  <strong>Mock C</strong> &mdash; Grid &mdash; KVヒーロー + 構造的グリッド
</div>

<!-- ── Header ── -->
<header>
  <div class="header-logo">
    BiVi
    <svg class="header-wave" viewBox="0 0 60 16" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="wave-grad-h" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#c7f284"/>
          <stop offset="100%" stop-color="#ff69b4"/>
        </linearGradient>
      </defs>
      <polyline points="0,8 10,8 16,8 22,3 28,13 34,5 40,8 60,8"
        stroke="url(#wave-grad-h)" stroke-width="2.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </div>
  <span class="header-tag">Your vibe starts here.</span>
</header>

<!-- ── Hero ── -->
<section class="hero">
  <div class="hero-kv">
    <span class="hero-kv-text">Key Visual — Step 3 で差し替え</span>
  </div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-brand" id="bivi-text">美少女Vibes</div>
    <div class="hero-sub">Bishojo Vibes</div>
    <div class="hero-wave-container">
      <svg id="bivi-wave" xmlns="http://www.w3.org/2000/svg" height="30" overflow="visible">
        <defs>
          <linearGradient id="wave-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#c7f284"/>
            <stop offset="100%" stop-color="#ff69b4"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <p class="hero-tagline">Your vibe starts here.</p>
  </div>
</section>

<!-- ── Stats ── -->
<div class="stats-bar">
  <div class="stat">
    <div class="stat-num">8</div>
    <div class="stat-label">Sites</div>
  </div>
  <div class="stat">
    <div class="stat-num">2</div>
    <div class="stat-label">Categories</div>
  </div>
  <div class="stat">
    <div class="stat-num">∞</div>
    <div class="stat-label">Vibes</div>
  </div>
</div>

<!-- ── Sites ── -->
<section class="sites-section">
  <h2 class="section-title">The Network</h2>
  <div class="sites-grid" id="sites-grid"></div>
</section>

<footer>
  <p>&copy; 2026 Bishojo Vibes</p>
</footer>

<script>
// ── Wave init ──
function initWave() {
  const svgNS = 'http://www.w3.org/2000/svg';
  const PHI = 1 / (1 + 1.618);
  const textEl = document.getElementById('bivi-text');
  const svgEl = document.getElementById('bivi-wave');
  if (!textEl || !svgEl) return;

  const w = textEl.getBoundingClientRect().width;
  svgEl.setAttribute('width', String(w));
  svgEl.setAttribute('viewBox', `0 0 ${w} 30`);

  const y = 15, c = w * PHI;
  const pts = [
    [0, y], [c-24, y], [c-16, y],
    [c-8, 5], [c, 25], [c+8, 10],
    [c+16, y], [w, y],
  ];

  const poly = document.createElementNS(svgNS, 'polyline');
  poly.setAttribute('points', pts.map(p => `${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' '));
  poly.setAttribute('stroke', 'url(#wave-grad)');
  poly.setAttribute('stroke-width', '7');
  poly.setAttribute('fill', 'none');
  poly.setAttribute('stroke-linecap', 'round');
  poly.setAttribute('stroke-linejoin', 'round');

  const len = w + 60;
  poly.setAttribute('stroke-dasharray', String(len));
  poly.setAttribute('stroke-dashoffset', String(len));
  poly.style.animation = `waveDash 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards`;
  svgEl.appendChild(poly);
}

// ── Sites grid ──
function renderSites() {
  const sites = [
    { name: 'Gero Heaven', desc: '無料ゲロイラマ天国', url: 'https://gero-heaven.com/', type: 'Video', icon: 'GH' },
    { name: 'Gokkun Heaven', desc: '無料ごっくん動画天国', url: 'https://gokkun-heaven.com/', type: 'Video', icon: 'GK' },
    { name: 'Futanari Heaven', desc: '無料ふたなり同人天国', url: 'https://futanari-heaven.com/', type: 'Doujin', icon: 'FH' },
    { name: 'Tentacle Heaven', desc: '無料触手同人天国', url: 'https://tentacle-heaven.com/', type: 'Doujin', icon: 'TH' },
    { name: 'Parody Heaven', desc: '無料パロディ同人天国', url: 'https://parody-heaven.com/', type: 'Doujin', icon: 'PH' },
    { name: 'NTR Heaven', desc: '無料NTR同人天国', url: 'https://ntr-heaven.com/', type: 'Doujin', icon: 'NH' },
    { name: 'Ishukan Heaven', desc: '無料異種姦同人天国', url: 'https://ishukan-heaven.com/', type: 'Doujin', icon: 'IH' },
    { name: 'Saimin Heaven', desc: '無料催眠同人天国', url: 'https://saimin-heaven.com/', type: 'Doujin', icon: 'SH' },
  ];

  const grid = document.getElementById('sites-grid');
  sites.forEach(s => {
    const card = document.createElement('a');
    card.className = 'site-card';
    card.href = s.url;
    card.rel = 'noopener';
    card.innerHTML = `
      <div class="site-icon">${s.icon}</div>
      <div class="site-name">${s.name}</div>
      <div class="site-desc">${s.desc}</div>
      <div class="site-meta">
        <span class="site-type">${s.type}</span>
        <span class="site-arrow">&rarr;</span>
      </div>
    `;
    grid.appendChild(card);
  });
}

document.fonts.ready.then(() => {
  initWave();
  renderSites();
});
</script>
</body>
</html>
