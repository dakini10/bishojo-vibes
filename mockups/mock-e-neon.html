<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mock E: Neon Pulse — サイバーパンク・ホログラフィック</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=M+PLUS+1p:wght@900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bv-lime: #c7f284;
  --bv-pink: #ff69b4;
  --bv-cyan: #58c4dc;
  --bv-bg: #050a10;
  --bv-surface: #0c1824;
  --bv-surface-alpha: rgba(12, 24, 36, 0.9);
  --bv-border: #152538;
  --bv-text: #e8e6e3;
  --bv-text-muted: #7a8b9d;
  --bv-text-dim: #4a5b6d;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bv-bg);
  color: var(--bv-text);
  font-family: system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }

/* ── Concept Badge ── */
.concept-badge {
  position: fixed;
  top: 16px;
  left: 16px;
  background: var(--bv-surface-alpha);
  backdrop-filter: blur(8px);
  border: 1px solid var(--bv-border);
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 12px;
  color: var(--bv-text-muted);
  z-index: 200;
}
.concept-badge strong { color: var(--bv-lime); }

/* ── Scanlines overlay ── */
.scanlines {
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 2px,
    rgba(0, 0, 0, 0.03) 2px,
    rgba(0, 0, 0, 0.03) 4px
  );
  pointer-events: none;
  z-index: 150;
}

/* ── Noise texture ── */
.noise {
  position: fixed;
  inset: 0;
  opacity: 0.03;
  pointer-events: none;
  z-index: 149;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px;
}

/* ── Hero ── */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* Grid background */
.hero-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(88, 196, 220, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(88, 196, 220, 0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  perspective: 800px;
  transform-style: preserve-3d;
}

.hero-grid::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 80%, transparent 20%, var(--bv-bg) 70%);
}

/* Ambient neon glows */
.neon-glow {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  mix-blend-mode: screen;
}

.glow-1 {
  width: 500px; height: 500px;
  background: var(--bv-lime);
  opacity: 0.06;
  top: 10%;
  left: 20%;
  animation: glowDrift1 10s ease-in-out infinite alternate;
}

.glow-2 {
  width: 400px; height: 400px;
  background: var(--bv-pink);
  opacity: 0.08;
  bottom: 20%;
  right: 15%;
  animation: glowDrift2 13s ease-in-out infinite alternate;
}

.glow-3 {
  width: 300px; height: 300px;
  background: var(--bv-cyan);
  opacity: 0.04;
  top: 50%;
  right: 40%;
  animation: glowDrift3 8s ease-in-out infinite alternate;
}

/* Hero content */
.hero-content {
  position: relative;
  z-index: 2;
  text-align: center;
}

/* ── Logo with neon glow ── */
.logo-wrap {
  position: relative;
  display: inline-block;
  opacity: 0;
  animation: neonFlicker 2s ease 0.5s forwards;
}

.logo-main {
  display: flex;
  align-items: baseline;
  justify-content: center;
  position: relative;
}

.logo-jp {
  font-family: 'M PLUS 1p', sans-serif;
  font-weight: 900;
  font-size: clamp(44px, 10vw, 80px);
  color: var(--bv-text);
  text-shadow:
    0 0 20px rgba(199, 242, 132, 0.3),
    0 0 60px rgba(199, 242, 132, 0.1);
}

.logo-en {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: clamp(44px, 10vw, 80px);
  color: var(--bv-text);
  text-shadow:
    0 0 20px rgba(255, 105, 180, 0.3),
    0 0 60px rgba(255, 105, 180, 0.1);
}

/* Wave */
.wave-wrap {
  margin-top: 8px;
  opacity: 0;
  animation: fadeIn 1s ease 2s forwards;
}

/* Sub-brand */
.sub-brand {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 8px;
  text-transform: uppercase;
  color: var(--bv-cyan);
  margin-top: 32px;
  opacity: 0;
  animation: typeIn 1s ease 2.5s forwards;
  text-shadow: 0 0 12px rgba(88, 196, 220, 0.5);
}

.tagline {
  font-size: 13px;
  color: var(--bv-text-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 16px;
  opacity: 0;
  animation: fadeInUp 1s ease 3s forwards;
}

/* Scroll indicator */
.scroll-ind {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  opacity: 0;
  animation: fadeIn 1s ease 3.5s forwards;
}

.scroll-diamond {
  width: 12px;
  height: 12px;
  border: 1px solid var(--bv-cyan);
  transform: rotate(45deg);
  animation: scrollBounce 2s ease-in-out infinite;
  box-shadow: 0 0 8px rgba(88, 196, 220, 0.3);
}

/* ── Horizontal line divider ── */
.hline {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--bv-lime), var(--bv-pink), transparent);
  opacity: 0.4;
}

/* ── Statement ── */
.statement {
  min-height: 70vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 24px;
  position: relative;
}

.stmt-counter {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: clamp(72px, 18vw, 160px);
  background: linear-gradient(135deg, var(--bv-lime), var(--bv-pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  opacity: 0;
  transform: scale(0.8);
  transition: opacity 1s ease, transform 1s cubic-bezier(0.16, 1, 0.3, 1);
  line-height: 1;
}

.stmt-counter.visible {
  opacity: 1;
  transform: scale(1);
}

.stmt-label {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--bv-text-muted);
  margin-top: 16px;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.8s ease 0.3s, transform 0.8s ease 0.3s;
}

.stmt-label.visible {
  opacity: 1;
  transform: translateY(0);
}

.stmt-desc {
  font-size: 14px;
  color: var(--bv-text-dim);
  margin-top: 12px;
  opacity: 0;
  transition: opacity 0.8s ease 0.5s;
}

.stmt-desc.visible { opacity: 1; }

/* ── KV ── */
.kv-section {
  padding: 40px 24px 80px;
  display: flex;
  justify-content: center;
}

.kv-frame {
  width: 100%;
  max-width: 800px;
  aspect-ratio: 16 / 9;
  border-radius: 4px;
  background: var(--bv-surface);
  border: 1px solid var(--bv-border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--bv-text-dim);
  font-size: 14px;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.kv-frame.visible {
  opacity: 1;
  transform: translateY(0);
}

/* Corner brackets */
.kv-frame::before, .kv-frame::after {
  content: '';
  position: absolute;
  width: 24px;
  height: 24px;
  border-color: var(--bv-lime);
  border-style: solid;
}

.kv-frame::before {
  top: 8px; left: 8px;
  border-width: 2px 0 0 2px;
}

.kv-frame::after {
  bottom: 8px; right: 8px;
  border-width: 0 2px 2px 0;
}

/* ── Sites: holographic cards ── */
.sites-section {
  padding: 40px 24px 100px;
  max-width: 1100px;
  margin: 0 auto;
}

.sites-header {
  text-align: center;
  margin-bottom: 48px;
}

.sites-header h2 {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--bv-cyan);
  text-shadow: 0 0 10px rgba(88, 196, 220, 0.3);
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}

.sites-header h2.visible {
  opacity: 1;
  transform: translateY(0);
}

.sites-header .sites-line {
  width: 60px;
  height: 1px;
  background: var(--bv-cyan);
  margin: 16px auto 0;
  opacity: 0.4;
}

.sites-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}

/* Holographic card */
.site-card {
  position: relative;
  background: var(--bv-surface);
  border: 1px solid var(--bv-border);
  border-radius: 8px;
  padding: 24px;
  overflow: hidden;
  transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s;
  opacity: 0;
  transform: translateY(30px) rotateX(5deg);
  transform-style: preserve-3d;
  perspective: 600px;
}

.site-card.visible {
  opacity: 1;
  transform: translateY(0) rotateX(0);
}

.site-card:hover {
  transform: translateY(-6px) scale(1.02) !important;
  border-color: var(--bv-cyan);
}

/* Holographic shimmer on hover */
.site-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    115deg,
    transparent 30%,
    rgba(199, 242, 132, 0.05) 45%,
    rgba(88, 196, 220, 0.08) 50%,
    rgba(255, 105, 180, 0.05) 55%,
    transparent 70%
  );
  opacity: 0;
  transition: opacity 0.3s;
  transform: translateX(-100%);
  animation: none;
}

.site-card:hover::before {
  opacity: 1;
  animation: holoShimmer 1.5s ease infinite;
}

/* Top border glow */
.site-card::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--bv-lime), var(--bv-cyan), var(--bv-pink));
  opacity: 0;
  transition: opacity 0.3s;
}

.site-card:hover::after {
  opacity: 0.8;
}

.site-index {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 11px;
  color: var(--bv-text-dim);
  margin-bottom: 12px;
  letter-spacing: 2px;
}

.site-name {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: 16px;
  margin-bottom: 6px;
}

.site-desc {
  font-size: 12px;
  color: var(--bv-text-muted);
  margin-bottom: 12px;
}

.site-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.site-type {
  font-family: 'Orbitron', sans-serif;
  font-size: 9px;
  font-weight: 700;
  color: var(--bv-cyan);
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 3px 8px;
  border: 1px solid rgba(88, 196, 220, 0.25);
  border-radius: 3px;
}

.site-arrow {
  color: var(--bv-text-dim);
  font-size: 18px;
  transition: color 0.3s, transform 0.3s;
}

.site-card:hover .site-arrow {
  color: var(--bv-lime);
  transform: translateX(4px);
}

/* ── Footer ── */
footer {
  text-align: center;
  padding: 40px 24px;
  font-size: 11px;
  color: var(--bv-text-dim);
  border-top: 1px solid var(--bv-border);
  position: relative;
}

/* ── Keyframes ── */
@keyframes neonFlicker {
  0% { opacity: 0; filter: brightness(2) blur(4px); }
  30% { opacity: 0.8; filter: brightness(1.5) blur(0); }
  40% { opacity: 0.4; filter: brightness(1); }
  50% { opacity: 1; filter: brightness(1.3); }
  70% { opacity: 0.9; filter: brightness(1); }
  100% { opacity: 1; filter: brightness(1); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes typeIn {
  from { opacity: 0; letter-spacing: 16px; }
  to { opacity: 1; letter-spacing: 8px; }
}

@keyframes glowDrift1 {
  from { transform: translate(0, 0); }
  to { transform: translate(60px, -40px); }
}

@keyframes glowDrift2 {
  from { transform: translate(0, 0); }
  to { transform: translate(-50px, 30px); }
}

@keyframes glowDrift3 {
  from { transform: translate(0, 0); }
  to { transform: translate(30px, -60px); }
}

@keyframes scrollBounce {
  0%, 100% { transform: rotate(45deg) translate(0, 0); opacity: 1; }
  50% { transform: rotate(45deg) translate(4px, 4px); opacity: 0.5; }
}

@keyframes holoShimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

@keyframes waveDash {
  from { stroke-dashoffset: 400; }
  to { stroke-dashoffset: 0; }
}
</style>
</head>
<body>

<div class="concept-badge">
  <strong>Mock E</strong> &mdash; Neon Pulse &mdash; サイバーパンク + ホログラフィック
</div>

<div class="scanlines"></div>
<div class="noise"></div>

<!-- ── Hero ── -->
<section class="hero">
  <div class="hero-grid"></div>
  <div class="neon-glow glow-1"></div>
  <div class="neon-glow glow-2"></div>
  <div class="neon-glow glow-3"></div>

  <div class="hero-content">
    <div class="logo-wrap">
      <div class="logo-main">
        <span class="logo-jp">美少女</span><span class="logo-en">Vibes</span>
      </div>
      <div class="wave-wrap">
        <svg id="logo-wave" xmlns="http://www.w3.org/2000/svg" height="30" overflow="visible">
          <defs>
            <linearGradient id="wave-grad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#c7f284"/>
              <stop offset="100%" stop-color="#ff69b4"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
    </div>
    <div class="sub-brand">Digital Experience Network</div>
    <p class="tagline">Your vibe starts here.</p>
  </div>

  <div class="scroll-ind">
    <div class="scroll-diamond"></div>
  </div>
</section>

<div class="hline"></div>

<!-- ── Statement ── -->
<section class="statement">
  <div class="stmt-counter" data-reveal data-count="8">0</div>
  <div class="stmt-label" data-reveal>Sites Connected</div>
  <div class="stmt-desc" data-reveal>One network. One vibe. Infinite possibilities.</div>
</section>

<div class="hline"></div>

<!-- ── KV ── -->
<section class="kv-section">
  <div class="kv-frame" data-reveal>
    Key Visual — Step 3 で差し替え
  </div>
</section>

<!-- ── Sites ── -->
<section class="sites-section">
  <div class="sites-header">
    <h2 data-reveal>Network Nodes</h2>
    <div class="sites-line"></div>
  </div>
  <div class="sites-grid" id="sites-grid"></div>
</section>

<footer>&copy; 2026 Bishojo Vibes</footer>

<script>
// ── Logo wave ──
function initLogoWave() {
  const svgNS = 'http://www.w3.org/2000/svg';
  const PHI = 1 / (1 + 1.618);
  const logoMain = document.querySelector('.logo-main');
  const svgEl = document.getElementById('logo-wave');
  if (!logoMain || !svgEl) return;

  const w = logoMain.getBoundingClientRect().width;
  svgEl.setAttribute('width', String(w));
  svgEl.setAttribute('viewBox', `0 0 ${w} 30`);

  const y = 15, c = w * PHI;
  const pts = [
    [0, y], [c-24, y], [c-16, y],
    [c-8, 5], [c, 25], [c+8, 10],
    [c+16, y], [w, y],
  ];

  const poly = document.createElementNS(svgNS, 'polyline');
  poly.setAttribute('points', pts.map(p => `${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' '));
  poly.setAttribute('stroke', 'url(#wave-grad)');
  poly.setAttribute('stroke-width', '7');
  poly.setAttribute('fill', 'none');
  poly.setAttribute('stroke-linecap', 'round');
  poly.setAttribute('stroke-linejoin', 'round');

  const len = w + 60;
  poly.setAttribute('stroke-dasharray', String(len));
  poly.setAttribute('stroke-dashoffset', String(len));
  poly.style.animation = 'waveDash 2s cubic-bezier(0.16, 1, 0.3, 1) 1.8s forwards';
  svgEl.appendChild(poly);
}

// ── Counter animation ──
function animateCounter(el) {
  const target = parseInt(el.dataset.count);
  let current = 0;
  const duration = 1500;
  const start = performance.now();
  function step(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    current = Math.round(eased * target);
    el.textContent = current;
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ── Scroll reveal ──
function initReveal() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        if (e.target.dataset.count) animateCounter(e.target);
      }
    });
  }, { threshold: 0.2 });

  document.querySelectorAll('[data-reveal]').forEach(el => observer.observe(el));
}

// ── Sites ──
function renderSites() {
  const sites = [
    { name: 'Gero Heaven', desc: '無料ゲロイラマ天国', url: 'https://gero-heaven.com/', type: 'Video' },
    { name: 'Gokkun Heaven', desc: '無料ごっくん動画天国', url: 'https://gokkun-heaven.com/', type: 'Video' },
    { name: 'Futanari Heaven', desc: '無料ふたなり同人天国', url: 'https://futanari-heaven.com/', type: 'Doujin' },
    { name: 'Tentacle Heaven', desc: '無料触手同人天国', url: 'https://tentacle-heaven.com/', type: 'Doujin' },
    { name: 'Parody Heaven', desc: '無料パロディ同人天国', url: 'https://parody-heaven.com/', type: 'Doujin' },
    { name: 'NTR Heaven', desc: '無料NTR同人天国', url: 'https://ntr-heaven.com/', type: 'Doujin' },
    { name: 'Ishukan Heaven', desc: '無料異種姦同人天国', url: 'https://ishukan-heaven.com/', type: 'Doujin' },
    { name: 'Saimin Heaven', desc: '無料催眠同人天国', url: 'https://saimin-heaven.com/', type: 'Doujin' },
  ];

  const grid = document.getElementById('sites-grid');
  sites.forEach((s, i) => {
    const card = document.createElement('a');
    card.className = 'site-card';
    card.href = s.url;
    card.rel = 'noopener';
    card.setAttribute('data-reveal', '');
    card.style.transitionDelay = `${i * 0.08}s`;
    card.innerHTML = `
      <div class="site-index">${String(i + 1).padStart(2, '0')}</div>
      <div class="site-name">${s.name}</div>
      <div class="site-desc">${s.desc}</div>
      <div class="site-meta">
        <span class="site-type">${s.type}</span>
        <span class="site-arrow">&rarr;</span>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ── 3D tilt on cards ──
function initCardTilt() {
  document.addEventListener('mousemove', (e) => {
    const cards = document.querySelectorAll('.site-card');
    cards.forEach(card => {
      const rect = card.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;
      const dist = Math.sqrt(
        Math.pow(e.clientX - (rect.left + rect.width/2), 2) +
        Math.pow(e.clientY - (rect.top + rect.height/2), 2)
      );
      if (dist < 400) {
        card.style.transform = `translateY(-6px) rotateY(${x * 8}deg) rotateX(${-y * 8}deg) scale(1.02)`;
      }
    });
  });
}

document.fonts.ready.then(() => {
  initLogoWave();
  renderSites();
  setTimeout(initReveal, 100);
  initCardTilt();
});
</script>
</body>
</html>
